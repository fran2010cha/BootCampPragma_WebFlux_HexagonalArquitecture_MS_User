server:
  port: 8080
spring:
  application:
    name: "CrediYa_MS"
  devtools:
    add-properties: false
  h2:
    console:
      enabled: true
      path: "/h2"
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

routes:
  paths:
    users: "/api/v1/usuarios"
    usersById: "/api/v1/usuarios/{id}"

adapters:
  r2dbc:
    host: "${POSTGRES_HOST:postgres-hu1}"
    port: "${POSTGRES_PORT:5432}"
    database: "${POSTGRES_DB:crediya}"
    schema: "public"
    username: "${POSTGRES_USER:postgres}"
    password: "${POSTGRES_PASSWORD:admin123}"